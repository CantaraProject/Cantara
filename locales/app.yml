  repositories_description:
    en: |-
      Cantara loads all source files from one or multiple repositories.
      Select one or multiple Repositories where Cantara will load source files from.
      You need to select at least one repository.
    de: |-
      Cantara lädt alle Dateien aus einer oder mehreren Quellen.
      Wählen Sie eine oder mehrere Quellen aus, aus denen Cantara Quelldateien laden soll.
      Es muss mindestens eine Quelle ausgewählt sein.
