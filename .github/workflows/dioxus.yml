name: Build and publish Cantara

permissions:
  contents: read

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target_dir: linux
          - os: windows-latest
            target_dir: windows
          - os: macos-latest
            target_dir: macos
    steps:
      - name: Provide npm (needed for the build)
        uses: actions/setup-node@v4
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Install cargo bininstall
        uses: cargo-bins/cargo-binstall@main
      - name: Run npm install
        run: npm install
      - name: Install dioxus-cli
        run: cargo binstall dioxus-cli
      - name: Install dependencies under Linux
        if: matrix.os == 'ubuntu-latest'
        run: |-
          sudo apt update
          sudo apt install libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - name: Install dependencies under Windows
        if: matrix.os == 'windows-latest'
        run: |-
          choco install openssl
      - name: Install dependencies under macOS
        if: matrix.os == 'macos-latest'
        run: |-
          brew update
          brew install openssl@3
          # Create symbolic links to the OpenSSL libraries
          sudo mkdir -p /usr/local/opt/openssl@3/lib
          sudo ln -sf $(brew --prefix openssl@3)/lib/libssl.3.dylib /usr/local/opt/openssl@3/lib/
          sudo ln -sf $(brew --prefix openssl@3)/lib/libcrypto.3.dylib /usr/local/opt/openssl@3/lib/
      - name: Run tests
        env:
          # OpenSSL environment variables
          OPENSSL_ROOT_DIR: ${{ matrix.os == 'macos-latest' && '/usr/local/opt/openssl@3' || (matrix.os == 'windows-latest' && 'C:\Program Files\OpenSSL' || (matrix.os == 'ubuntu-latest' && '/usr' || '')) }}
          OPENSSL_DIR: ${{ matrix.os == 'macos-latest' && '/usr/local/opt/openssl@3' || (matrix.os == 'windows-latest' && 'C:\Program Files\OpenSSL' || (matrix.os == 'ubuntu-latest' && '/usr' || '')) }}
          OPENSSL_LIB_DIR: ${{ matrix.os == 'windows-latest' && 'C:\Program Files\OpenSSL\lib' || (matrix.os == 'ubuntu-latest' && '/usr/lib/x86_64-linux-gnu' || '') }}
          OPENSSL_INCLUDE_DIR: ${{ matrix.os == 'windows-latest' && 'C:\Program Files\OpenSSL\include' || (matrix.os == 'ubuntu-latest' && '/usr/include' || '') }}
          DYLD_LIBRARY_PATH: ${{ matrix.os == 'macos-latest' && '/usr/local/opt/openssl@3/lib' || '' }}
        run: cargo test
      - name: Build desktop release
        env:
          # OpenSSL environment variables
          OPENSSL_ROOT_DIR: ${{ matrix.os == 'macos-latest' && '/usr/local/opt/openssl@3' || (matrix.os == 'windows-latest' && 'C:\Program Files\OpenSSL' || (matrix.os == 'ubuntu-latest' && '/usr' || '')) }}
          OPENSSL_DIR: ${{ matrix.os == 'macos-latest' && '/usr/local/opt/openssl@3' || (matrix.os == 'windows-latest' && 'C:\Program Files\OpenSSL' || (matrix.os == 'ubuntu-latest' && '/usr' || '')) }}
          OPENSSL_LIB_DIR: ${{ matrix.os == 'windows-latest' && 'C:\Program Files\OpenSSL\lib' || (matrix.os == 'ubuntu-latest' && '/usr/lib/x86_64-linux-gnu' || '') }}
          OPENSSL_INCLUDE_DIR: ${{ matrix.os == 'windows-latest' && 'C:\Program Files\OpenSSL\include' || (matrix.os == 'ubuntu-latest' && '/usr/include' || '') }}
          DYLD_LIBRARY_PATH: ${{ matrix.os == 'macos-latest' && '/usr/local/opt/openssl@3/lib' || '' }}
        run: dx build -r
      - name: Upload desktop artifact (Mac OS)
        if: matrix.os == 'macos-latest' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target_dir }}
          path: target/dx/cantara/release/macos/
      - name: Upload desktop artifact (Windows and Linux)
        if: matrix.os != 'macos-latest' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target_dir }}
          path: target/dx/cantara/release/${{ matrix.target_dir }}/app/

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    env:
      ANDROID_NDK_VERSION: "27.0.12077973"
      ANDROID_API_LEVEL: "34"
      ANDROID_BUILD_TOOLS_VERSION: "34.0.0"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Android NDK and SDK components
        run: |
          echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${ANDROID_NDK_VERSION}" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> $GITHUB_ENV
      - name: Provide npm
        uses: actions/setup-node@v4
      - name: Run npm install
        run: npm install
      - name: Install cargo bininstall
        uses: cargo-bins/cargo-binstall@main
      - name: Install dioxus-cli
        run: cargo binstall -y dioxus-cli
      - name: Add Rust Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add x86_64-linux-android
      - name: Run tests
        run: cargo test
      - name: Build Android release
        run: dx build --platform android --release
      - name: Upload Android artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: target/dx/cantara/release/android/

  build-web:
    name: Build and deploy web (GitHub Pages)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    # Only associate with github-pages environment on push (empty name skips environment on PRs)
    environment:
      name: ${{ github.event_name == 'push' && 'github-pages' || '' }}
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      # Comma-separated list of GitHub repositories (owner/repo) to bundle with the web build.
      # These repos are cloned at build time and their song files are embedded into the WASM binary,
      # avoiding CORS issues when loading external repository resources in WebAssembly.
      CANTARA_BUNDLED_REPOS: "reckel-jm/cantara-songrepo"
    steps:
      - name: Provide npm
        uses: actions/setup-node@v4
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Clone bundled song repositories
        run: |
          IFS=',' read -ra REPOS <<< "$CANTARA_BUNDLED_REPOS"
          for repo in "${REPOS[@]}"; do
            repo=$(echo "$repo" | xargs)
            echo "Cloning https://github.com/${repo} ..."
            git clone --depth 1 "https://github.com/${repo}.git" "bundled_repos/${repo}"
          done
      - name: Run npm install
        run: npm install
      - name: Install Rust wasm32 target
        run: rustup target add wasm32-unknown-unknown
      - name: Install cargo bininstall
        uses: cargo-bins/cargo-binstall@main
      - name: Install dioxus-cli
        run: cargo binstall -y dioxus-cli
      - name: Build web release
        run: dx build --platform web --release
      - name: Setup GitHub Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@v4
      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/dx/cantara/release/web/public/
      - name: Deploy to GitHub Pages
        if: github.event_name == 'push'
        id: deployment
        uses: actions/deploy-pages@v4
